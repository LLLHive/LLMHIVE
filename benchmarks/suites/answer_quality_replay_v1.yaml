# LLMHive Answer Quality Replay Benchmark Suite v1.0
# =================================================
# Real product-failure replays. These cases are intentionally grounded in
# actual user exchanges where orchestration looked strong in aggregate metrics
# but the final answer was stale, incomplete, over-confident, or poorly
# formatted.

metadata:
  suite_name: "Answer Quality Replay"
  version: "1.0.0"
  description: "Replay real user-facing answer quality failures with deterministic graders"
  categories:
    - answer_quality_replay
  total_prompts: 6
  created_date: "2026-05-23"
  maintainer: "LLMHive Benchmark Team"

prompts:
  - id: aqr_free_llm_models_20260523
    category: answer_quality_replay
    prompt: "Review our history in this chat so that you do not make the same mistakes again and provide me with the best free LLM models to use for our AI agent. Make sure your data is current; today is 5/23/26. Include exact model IDs/model numbers and the best way to connect each model to our LLMHive agent, with setup links where available. Confirm what is public-free versus direct/provider-paid through LLMHive."
    history:
      - role: user
        content: "Rank the best free LLM Models as of 5/23/26 and include the best way to connect to them to our agent."
      - role: assistant
        content: "Listed GPT-Neo, GPT-J, BLOOM, LLaMA, OPT, FLAN-T5, ALPACA, T5, MPT, and Cohere Command R with generic Hugging Face/API guidance."
      - role: user
        content: "Confirm your last answer. You are missing some of the newer Chinese models which are excellent."
      - role: assistant
        content: "Listed ChatGLM, MMLU, Pangu-Alpha, CPM, GODEL, GPT-NeoX, OPT, BLOOM, Ernie, and MOSS with generic links."
      - role: user
        content: "You are either really right or really wrong because we had in mind other models, Kimi, Deepseek, LLama, Qwen."
      - role: assistant
        content: "Only listed Kimi, Deepseek, Llama, and Qwen families without exact model IDs, versions, connection paths, or links."
      - role: user
        content: "Your last answer is incomplete. You mention the model family but not the actual model. Regenerate it and include specific information as to the best way to connect the agent to it with online links to set up the connections if available. Confirm your answer is accurate and current."
      - role: assistant
        content: "Returned generic ChatGLM, Kimi, Deepseek, Llama, and Qwen descriptions with fake or malformed links and no exact model IDs."
      - role: user
        content: "Your last answer is missing some of the models you proposed in the previous answer and it is still incomplete; it does not have the model numbers."
    expected:
      expected_contains: "LLMHive"
    requirements:
      requires_no_clarification: true
      quality_replay:
        required_model_ids:
          - "deepseek/deepseek-chat"
          - "qwen/qwen3-next-80b-a3b-instruct:free"
          - "meta-llama/llama-3.3-70b-instruct:free"
          - "kimi-k2.6"
        required_terms:
          - "Kimi"
          - "DeepSeek"
          - "Qwen"
          - "Llama"
          - "exact model"
          - "LLMHive"
          - "Moonshot"
        legacy_models:
          - "GPT-Neo"
          - "GPT-J"
          - "BLOOM"
          - "OPT"
          - "Alpaca"
          - "MMLU"
        require_llmhive_connection: true
        connection_terms:
          - "LLMHive"
          - "model picker"
          - "Automatic routing"
          - "direct API"
          - "Moonshot"
          - "DeepSeek"
          - "Dashscope"
          - "Groq"
          - "slug"
          - "preferred_api"
          - "native_model_id"
        min_connection_terms: 4
        require_valid_links: true
        require_clean_markdown: true
        require_honest_confidence: true
    scoring:
      objective_weight: 1.0
      rubric_weight: 0.0
      critical: true
    notes: "Real replay of the 2026-05-23 free-model recommendation failure. Must preserve user corrections, include exact current IDs, avoid legacy hallucinations, provide LLMHive connection paths, and avoid fake consensus/confidence claims."

  - id: aqr_kimi_moonshot_connection_20260523
    category: answer_quality_replay
    prompt: "Before implementing the next answer-quality step, review whether our Kimi connection through Moonshot.ai is actually working. Confirm the correct LLMHive connection path and how it should be described in user-facing model recommendations."
    history:
      - role: user
        content: "Our KIMI connection through Mooshot.ai seems to be working."
      - role: assistant
        content: "Earlier answer-quality notes said Kimi should not be called a public free OpenRouter model unless live catalog verification proves it."
    expected:
      expected_contains: "Kimi"
    requirements:
      requires_no_clarification: true
      quality_replay:
        required_model_ids:
          - "kimi-k2.6"
        required_terms:
          - "Moonshot"
          - "Kimi_K26_Api_Key"
          - "https://api.moonshot.ai/v1"
          - "direct API"
          - "LLMHive"
          - "public free"
        require_llmhive_connection: true
        connection_terms:
          - "LLMHive"
          - "Moonshot"
          - "direct API"
          - "Kimi_K26_Api_Key"
          - "kimi-k2.6"
          - "api.moonshot.ai"
        min_connection_terms: 4
        require_valid_links: true
        require_clean_markdown: true
        require_honest_confidence: true
    scoring:
      objective_weight: 1.0
      rubric_weight: 0.0
      critical: false
    notes: "Prevents future answers from excluding Kimi after the direct Moonshot route has been verified, while preserving the public-free versus direct-provider distinction."

  - id: aqr_provider_setup_links_20260523
    category: answer_quality_replay
    prompt: "Give setup links for connecting DeepSeek, Qwen/Dashscope, Llama/Groq, and Kimi/Moonshot to our LLMHive agent. Do not include fake GitHub repositories or malformed URLs."
    history:
      - role: user
        content: "The last answer linked to fake pages like github. com/KimiModelRepo and deepseek. tech/docs."
      - role: assistant
        content: "Acknowledged that fake or malformed provider links must be blocked."
    expected:
      expected_contains: "LLMHive"
    requirements:
      requires_no_clarification: true
      quality_replay:
        required_model_ids:
          - "deepseek/deepseek-chat"
          - "qwen/qwen3-next-80b-a3b-instruct:free"
          - "kimi-k2.6"
        required_terms:
          - "https://api-docs.deepseek.com/"
          - "https://help.aliyun.com/zh/model-studio/"
          - "https://ai.meta.com/llama/"
          - "https://platform.moonshot.ai/docs"
          - "LLMHive"
          - "slug"
        legacy_models:
          - "GPT-Neo"
          - "BLOOM"
          - "Alpaca"
        require_llmhive_connection: true
        connection_terms:
          - "LLMHive"
          - "slug"
          - "direct API"
          - "Moonshot"
          - "Dashscope"
          - "Groq"
          - "DeepSeek"
        min_connection_terms: 4
        require_valid_links: true
        require_clean_markdown: true
        require_honest_confidence: true
    scoring:
      objective_weight: 1.0
      rubric_weight: 0.0
      critical: false
    notes: "Catches fake setup links and generic connection guidance that does not map to actual LLMHive/provider wiring."

  - id: aqr_honest_consensus_explanation_20260523
    category: answer_quality_replay
    prompt: "Explain why the app showed high consensus while the answer quality was poor. Be honest about what consensus means and do not claim 88%, 100%, or guaranteed accuracy unless it is explicitly backend-reported and caveated."
    history:
      - role: user
        content: "The app showed 88% consensus and 100% in Why this answer, but the model list was wrong and incomplete."
      - role: assistant
        content: "The UI previously hardcoded 88% for multi-model responses and the backend consensus score was lexical/model agreement, not factual verification."
    expected:
      expected_contains: "consensus"
    requirements:
      requires_no_clarification: true
      quality_replay:
        required_terms:
          - "model agreement"
          - "not factual verification"
          - "backend"
          - "confidence"
          - "quality"
        require_llmhive_connection: false
        require_valid_links: true
        require_clean_markdown: true
        require_honest_confidence: true
    scoring:
      objective_weight: 1.0
      rubric_weight: 0.0
      critical: false
    notes: "Prevents misleading quality/consensus explanations from masking bad final answers."

  - id: aqr_free_llm_models_ui_format_20260523
    category: answer_quality_replay
    prompt: "rank the best free LLM Models as of 5/23/26 and include the best way to connect to them to our agent"
    history:
      - role: user
        content: "The UI rendered the prior answer with inline 'code Copy' fragments, flattened numbering like Documentation.2., and an unsupported 88% consensus badge."
    expected:
      expected_contains: "LLMHive"
    requirements:
      requires_no_clarification: true
      quality_replay:
        required_model_ids:
          - "meta-llama/llama-3.3-70b-instruct:free"
          - "qwen/qwen3-next-80b-a3b-instruct:free"
          - "deepseek/deepseek-chat"
          - "kimi-k2.6"
        required_terms:
          - "exact model"
          - "slug"
          - "LLMHive"
          - "Moonshot"
          - "public free"
        legacy_models:
          - "GPT-Neo"
          - "GPT-J"
          - "BLOOM"
          - "OPT"
          - "Alpaca"
        require_llmhive_connection: true
        connection_terms:
          - "LLMHive"
          - "model picker"
          - "direct API"
          - "Moonshot"
          - "DeepSeek"
          - "Dashscope"
          - "Groq"
          - "slug"
        min_connection_terms: 4
        require_valid_links: true
        require_clean_markdown: true
        require_honest_confidence: true
    scoring:
      objective_weight: 1.0
      rubric_weight: 0.0
      critical: true
    notes: "Catches the exact UI-facing free-model prompt that rendered with code-copy artifacts, flattened numbering, and unsupported consensus."

  - id: aqr_paid_llm_models_20260523
    category: answer_quality_replay
    prompt: "rank the best paid LLM Models as of 5/23/26 and include the best way to connect to them to our agent"
    history:
      - role: user
        content: "The previous paid-model answer listed stale generic models like GPT-4 Turbo, Claude 3, Gemini 1 Pro, Cohere Command R, and LLaMA 4 X, and it appended an irrelevant Kimi/free caveat."
    expected:
      expected_contains: "LLMHive"
    requirements:
      requires_no_clarification: true
      quality_replay:
        required_model_ids:
          - "anthropic/claude-opus-4.7"
          - "openai/gpt-5.5-pro"
          - "google/gemini-3.1-pro-preview"
          - "moonshotai/kimi-k2.6"
        required_terms:
          - "paid"
          - "exact model"
          - "slug"
          - "LLMHive"
          - "direct API"
        legacy_models:
          - "GPT-4 Turbo"
          - "Claude 3"
          - "Gemini 1 Pro"
          - "LLaMA 4 X"
        require_llmhive_connection: true
        connection_terms:
          - "LLMHive"
          - "model picker"
          - "Automatic routing"
          - "direct API"
          - "preferred_api"
          - "native_model_id"
          - "slug"
        min_connection_terms: 4
        require_valid_links: true
        require_clean_markdown: true
        require_honest_confidence: true
    scoring:
      objective_weight: 1.0
      rubric_weight: 0.0
      critical: true
    notes: "Prevents paid-model recommendation answers from falling back to stale 2024-era model names or inconsistent formatting."
