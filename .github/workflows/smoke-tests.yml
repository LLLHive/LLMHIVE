name: Production Smoke Tests

on:
  # Run daily at 6 AM UTC
  schedule:
    - cron: '0 6 * * *'
  
  # Run after successful deployment to main
  workflow_run:
    workflows: ["ci-cd.yaml", "Deploy to Production"]
    types:
      - completed
    branches:
      - main
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      production_url:
        description: 'Production URL to test'
        required: false
        default: ''
        type: string
      notify_on_success:
        description: 'Send notification on success'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'

jobs:
  smoke-tests:
    name: Run Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    # Only run if workflow_run succeeded (or if triggered manually/scheduled)
    if: |
      github.event_name != 'workflow_run' || 
      github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests python-dotenv

      # Authenticate to GCP for Secret Manager access
      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Fetch secrets from GCP Secret Manager
        id: fetch-secrets
        if: steps['gcp-auth'].outcome == 'success'
        run: |
          echo "Fetching secrets from GCP Secret Manager..."
          
          # API key (using existing 'api-key' secret)
          API_KEY=$(gcloud secrets versions access latest --secret="api-key" --project=llmhive-orchestrator 2>/dev/null || echo "")
          if [ -n "$API_KEY" ]; then
            echo "✅ Retrieved api-key from Secret Manager"
            echo "SMOKE_TEST_API_KEY=$API_KEY" >> $GITHUB_ENV
          else
            echo "::warning::api-key not found in Secret Manager"
          fi
          
          # Slack webhook URL for failure notifications
          SLACK_URL=$(gcloud secrets versions access latest --secret="slack-webhook-url" --project=llmhive-orchestrator 2>/dev/null || echo "")
          if [ -n "$SLACK_URL" ]; then
            echo "✅ Retrieved slack-webhook-url from Secret Manager"
            echo "SLACK_WEBHOOK_URL=$SLACK_URL" >> $GITHUB_ENV
          else
            echo "::warning::slack-webhook-url not found in Secret Manager (Slack notifications disabled)"
          fi

      - name: Determine production URL
        id: url
        run: |
          # Priority: 1) Manual input, 2) Cloud Run production URL
          if [ -n "${{ github.event.inputs.production_url }}" ]; then
            echo "url=${{ github.event.inputs.production_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://llmhive-orchestrator-7h6b36l7ta-ue.a.run.app" >> $GITHUB_OUTPUT
          fi

      - name: Run smoke tests
        id: smoke
        env:
          PRODUCTION_URL: ${{ steps.url.outputs.url }}
          SMOKE_TIMEOUT: '60'
        run: |
          echo "Running smoke tests against: $PRODUCTION_URL"
          pytest tests/smoke/ \
            --production-url="$PRODUCTION_URL" \
            --api-key="${SMOKE_TEST_API_KEY:-}" \
            --smoke-timeout=60 \
            -v \
            --tb=short \
            --junit-xml=smoke-test-results.xml \
            2>&1 | tee smoke-test-output.txt
          
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: smoke-test-results
          path: |
            smoke-test-results.xml
            smoke-test-output.txt
          retention-days: 30

      - name: Capture Cloud Run latency diagnostics on failure
        if: failure() && steps['gcp-auth'].outcome == 'success'
        env:
          PRODUCTION_URL: ${{ steps.url.outputs.url }}
        run: |
          mkdir -p artifacts/smoke_diagnostics
          gcloud logging read \
            "resource.type=\"cloud_run_revision\" AND resource.labels.service_name=\"llmhive-orchestrator\" AND httpRequest.requestMethod=\"POST\" AND timestamp>=\"$(date -u -d '20 minutes ago' +%Y-%m-%dT%H:%M:%SZ)\"" \
            --project=llmhive-orchestrator \
            --limit=50 \
            --format=json \
            > artifacts/smoke_diagnostics/cloud_run_post_requests.json || true
          python - <<'PY'
          import json
          from pathlib import Path
          src = Path("artifacts/smoke_diagnostics/cloud_run_post_requests.json")
          out = Path("artifacts/smoke_diagnostics/cloud_run_post_summary.txt")
          if not src.exists():
              out.write_text("No Cloud Run request log dump was captured.\n")
              raise SystemExit(0)
          try:
              rows = json.loads(src.read_text() or "[]")
          except json.JSONDecodeError:
              out.write_text("Cloud Run request log dump was not valid JSON.\n")
              raise SystemExit(0)
          post_rows = []
          for row in rows:
              req = row.get("httpRequest", {})
              url = req.get("requestUrl", "")
              if "/v1/chat" not in url:
                  continue
              latency = req.get("latency", "0s")
              post_rows.append({
                  "timestamp": row.get("timestamp", ""),
                  "status": req.get("status", ""),
                  "latency": latency,
                  "url": url,
              })
          post_rows.sort(key=lambda x: x["timestamp"])
          lines = ["Recent /v1/chat Cloud Run requests:"]
          if not post_rows:
              lines.append("No /v1/chat requests found in the sampled window.")
          else:
              for item in post_rows[-15:]:
                  lines.append(f"{item['timestamp']} status={item['status']} latency={item['latency']} url={item['url']}")
          out.write_text("\n".join(lines) + "\n")
          PY

      - name: Upload smoke diagnostics
        uses: actions/upload-artifact@v4
        if: failure() && steps['gcp-auth'].outcome == 'success'
        with:
          name: smoke-diagnostics
          path: artifacts/smoke_diagnostics/
          retention-days: 14

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: smoke-test-results.xml
          check_name: "Smoke Test Results"
          comment_mode: "off"

      # Slack notifications - only run if webhook is configured
      - name: Send Slack notification on failure
        if: |
          failure() && 
          env.SLACK_WEBHOOK_URL != '' &&
          github.event_name != 'workflow_dispatch' &&
          github.repository_owner == 'LLMHive'
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "Production Smoke Tests Failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Production Smoke Tests Failed*\n\nThe LLMHive production API may be experiencing issues."
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Environment:*\nProduction"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Triggered by:*\n${{ github.event_name }}"
                    }
                  ]
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  critical-tests:
    name: Critical Health Checks
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    if: |
      github.event_name != 'workflow_run' || 
      github.event.workflow_run.conclusion == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pytest requests

      - name: Determine production URL
        id: url
        run: |
          # Priority: 1) Manual input, 2) Cloud Run production URL
          if [ -n "${{ github.event.inputs.production_url }}" ]; then
            echo "url=${{ github.event.inputs.production_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://llmhive-orchestrator-7h6b36l7ta-ue.a.run.app" >> $GITHUB_OUTPUT
          fi

      - name: Run critical health checks only
        env:
          PRODUCTION_URL: ${{ steps.url.outputs.url }}
        run: |
          echo "Running critical health checks against: $PRODUCTION_URL"
          pytest tests/smoke/test_production.py::TestHealthEndpoints \
            --production-url="$PRODUCTION_URL" \
            --smoke-timeout=30 \
            -v \
            -m "critical or smoke"

  quality-benchmarks:
    name: Quality Benchmark Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    # Only run if full smoke tests passed
    needs: [smoke-tests]
    if: |
      needs.smoke-tests.result == 'success'
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest requests python-dotenv

      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Fetch secrets from GCP Secret Manager
        id: fetch-secrets
        if: steps['gcp-auth'].outcome == 'success'
        run: |
          API_KEY=$(gcloud secrets versions access latest --secret="api-key" --project=llmhive-orchestrator 2>/dev/null || echo "")
          if [ -n "$API_KEY" ]; then
            echo "✅ Retrieved api-key from Secret Manager"
            echo "QUALITY_TEST_API_KEY=$API_KEY" >> $GITHUB_ENV
          fi

      - name: Determine production URL
        id: url
        run: |
          if [ -n "${{ github.event.inputs.production_url }}" ]; then
            echo "url=${{ github.event.inputs.production_url }}" >> $GITHUB_OUTPUT
          else
            echo "url=https://llmhive-orchestrator-7h6b36l7ta-ue.a.run.app" >> $GITHUB_OUTPUT
          fi

      - name: Run quality benchmark tests
        id: quality
        env:
          PRODUCTION_URL: ${{ steps.url.outputs.url }}
        run: |
          echo "Running quality benchmarks against: $PRODUCTION_URL"
          pytest tests/smoke/test_quality_benchmark.py \
            --production-url="$PRODUCTION_URL" \
            --api-key="${QUALITY_TEST_API_KEY:-}" \
            --smoke-timeout=120 \
            -v \
            --tb=short \
            -m "quality" \
            2>&1 | tee quality-test-output.txt
          
          exit_code=${PIPESTATUS[0]}
          echo "exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code
        continue-on-error: true

      - name: Upload quality test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-test-results
          path: quality-test-output.txt
          retention-days: 30

      - name: Check quality results
        run: |
          if [ "${{ steps.quality.outputs.exit_code }}" != "0" ]; then
            echo "::warning::Quality benchmarks detected potential regressions"
            echo "Review quality-test-output.txt for details"
          else
            echo "✅ Quality benchmarks passed"
          fi

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [smoke-tests, critical-tests, quality-benchmarks]
    if: always()
    
    steps:
      - name: Check results
        run: |
          echo "## Smoke Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          if [ "${{ needs.critical-tests.result }}" == "success" ]; then
            echo "✅ Critical Tests: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Critical Tests: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.smoke-tests.result }}" == "success" ]; then
            echo "✅ Full Smoke Tests: Passed" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Full Smoke Tests: Failed" >> $GITHUB_STEP_SUMMARY
          fi
          
          if [ "${{ needs.quality-benchmarks.result }}" == "success" ]; then
            echo "✅ Quality Benchmarks: Passed" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.quality-benchmarks.result }}" == "skipped" ]; then
            echo "⏭️ Quality Benchmarks: Skipped (smoke tests failed)" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Quality Benchmarks: Failed - Review for regressions" >> $GITHUB_STEP_SUMMARY
          fi
