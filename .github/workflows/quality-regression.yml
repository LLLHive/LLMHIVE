name: Quality Regression Tests

on:
  # Run daily at 7 AM UTC (after smoke tests)
  schedule:
    - cron: '0 7 * * *'
  
  # Run on push to main
  push:
    branches:
      - main
    paths:
      - 'llmhive/**'
      - 'benchmarks/suites/answer_quality_replay_v1.yaml'
      - 'tests/quality_eval/**'
      - '.github/workflows/quality-regression.yml'
  
  # Run on PRs
  pull_request:
    branches:
      - main
    paths:
      - 'llmhive/**'
      - 'benchmarks/suites/answer_quality_replay_v1.yaml'
      - 'tests/quality_eval/**'
  
  # Allow manual triggering
  workflow_dispatch:
    inputs:
      run_live_audit:
        description: 'Run live audit against staging'
        required: false
        default: false
        type: boolean
      max_prompts:
        description: 'Max prompts for live audit'
        required: false
        default: '20'
        type: string
      run_answer_replay:
        description: 'Run live answer quality replay benchmark'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.12'

jobs:
  unit-quality-tests:
    name: Unit Quality Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pyyaml requests aiohttp

      - name: Run quality evaluation tests
        run: |
          pytest tests/quality_eval -v --tb=short -x \
            --junit-xml=quality-test-results.xml \
            2>&1 | tee quality-test-output.txt

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: quality-test-results
          path: |
            quality-test-results.xml
            quality-test-output.txt
          retention-days: 30

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: quality-test-results.xml
          check_name: "Quality Test Results"
          comment_mode: "off"

  answer-quality-replay:
    name: Answer Quality Replay
    runs-on: ubuntu-latest
    timeout-minutes: 20
    continue-on-error: true
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pyyaml requests aiohttp httpx

      - name: Validate replay suite and deterministic graders
        run: |
          python -m pytest \
            llmhive/tests/test_answer_quality_replay_scoring.py \
            llmhive/tests/test_model_catalog_grounding.py \
            llmhive/tests/test_answer_format.py \
            -v --tb=short \
            --junit-xml=answer-quality-replay-tests.xml \
            2>&1 | tee answer-quality-replay-test-output.txt

      - name: Authenticate to Google Cloud
        id: gcp-auth
        if: |
          (github.event_name == 'workflow_dispatch' && github.event.inputs.run_answer_replay == 'true') ||
          (github.event_name == 'schedule' && github.repository_owner == 'LLMHive')
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Fetch replay secrets
        id: fetch-replay-secrets
        if: steps['gcp-auth'].outcome == 'success'
        run: |
          API_KEY=$(gcloud secrets versions access latest --secret="api-key" --project=llmhive-orchestrator 2>/dev/null || echo "")
          if [ -n "$API_KEY" ]; then
            echo "::add-mask::$API_KEY"
            echo "LLMHIVE_API_KEY=$API_KEY" >> $GITHUB_ENV
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          else
            echo "::warning::api-key not found; live answer replay will be skipped"
            echo "secrets_available=false" >> $GITHUB_OUTPUT
          fi

          BENCH_SECRET=$(gcloud secrets versions access latest --secret="scheduled-benchmark-secret" --project=llmhive-orchestrator 2>/dev/null || echo "")
          if [ -n "$BENCH_SECRET" ]; then
            echo "::add-mask::$BENCH_SECRET"
            echo "LLMHIVE_SCHEDULED_BENCHMARK_SECRET=$BENCH_SECRET" >> $GITHUB_ENV
          else
            echo "::warning::scheduled-benchmark-secret not found; live answer replay may be gated"
          fi

      - name: Run live answer quality replay benchmark
        id: live-replay
        if: |
          steps.fetch-replay-secrets.outputs.secrets_available == 'true' &&
          (
            (github.event_name == 'workflow_dispatch' && github.event.inputs.run_answer_replay == 'true') ||
            (github.event_name == 'schedule' && github.repository_owner == 'LLMHive')
          )
        env:
          LLMHIVE_BENCHMARK_URL: https://llmhive-orchestrator-792354158895.us-east1.run.app
          LLMHIVE_API_KEY: ${{ env.LLMHIVE_API_KEY }}
          LLMHIVE_SCHEDULED_BENCHMARK_SECRET: ${{ env.LLMHIVE_SCHEDULED_BENCHMARK_SECRET }}
        run: |
          mkdir -p artifacts/benchmarks/answer_quality_replay
          python -m llmhive.app.benchmarks.cli \
            --suite benchmarks/suites/answer_quality_replay_v1.yaml \
            --systems llmhive \
            --mode http \
            --outdir artifacts/benchmarks/answer_quality_replay \
            --timeout 180 \
            2>&1 | tee answer-quality-replay-live-output.txt

      - name: Upload answer replay artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: answer-quality-replay-results
          path: |
            answer-quality-replay-tests.xml
            answer-quality-replay-test-output.txt
            answer-quality-replay-live-output.txt
            artifacts/benchmarks/answer_quality_replay/
          retention-days: 30

  live-audit:
    name: Live Prompt Audit
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: unit-quality-tests
    permissions:
      contents: read
      id-token: write
    
    # Only run if:
    # - Manually triggered with run_live_audit=true, OR
    # - Scheduled run AND secrets are available
    if: |
      (github.event_name == 'workflow_dispatch' && github.event.inputs.run_live_audit == 'true') ||
      (github.event_name == 'schedule' && github.repository_owner == 'LLMHive')
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-asyncio pyyaml requests aiohttp

      # Authenticate to GCP for Secret Manager access
      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Fetch secrets from GCP Secret Manager
        id: fetch-secrets
        if: steps['gcp-auth'].outcome == 'success'
        run: |
          echo "Fetching secrets from GCP Secret Manager..."
          
          # Use production URL (no staging environment - use production for live audit)
          echo "LLMHIVE_STAGING_URL=https://llmhive-orchestrator-7h6b36l7ta-ue.a.run.app" >> $GITHUB_ENV
          echo "✅ Using production URL for live audit"
          
          # API key (using existing 'api-key' secret)
          API_KEY=$(gcloud secrets versions access latest --secret="api-key" --project=llmhive-orchestrator 2>/dev/null || echo "")
          if [ -n "$API_KEY" ]; then
            echo "✅ Retrieved api-key from Secret Manager"
            echo "LLMHIVE_API_KEY=$API_KEY" >> $GITHUB_ENV
          else
            echo "::warning::api-key not found in Secret Manager"
          fi

      - name: Check if secrets are available
        id: check_secrets
        run: |
          if [ -n "$LLMHIVE_STAGING_URL" ] && [ -n "$LLMHIVE_API_KEY" ]; then
            echo "secrets_available=true" >> $GITHUB_OUTPUT
          else
            echo "secrets_available=false" >> $GITHUB_OUTPUT
            echo "::notice::Skipping live audit - API key not available"
          fi

      - name: Run live audit (staging)
        if: steps.check_secrets.outputs.secrets_available == 'true'
        run: |
          max_prompts="${{ github.event.inputs.max_prompts || '50' }}"
          
          python tests/quality_eval/live_prompt_audit.py \
            --mode=staging \
            --max-prompts="$max_prompts" \
            --output=artifacts/quality/live_audit_report.json \
            2>&1 | tee live-audit-output.txt
          
          exit_code=${PIPESTATUS[0]}
          echo "audit_exit_code=$exit_code" >> $GITHUB_OUTPUT
          exit $exit_code

      - name: Run live audit (local mode - fallback)
        if: steps.check_secrets.outputs.secrets_available != 'true'
        run: |
          echo "Running in local mode (no staging secrets available)"
          
          python tests/quality_eval/live_prompt_audit.py \
            --mode=local \
            --max-prompts=10 \
            --output=artifacts/quality/live_audit_report.json \
            --critical-only \
            2>&1 | tee live-audit-output.txt || true
          
          echo "::warning::Live audit ran in local mode with limited prompts"

      - name: Upload audit artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: live-audit-results
          path: |
            artifacts/quality/
            live-audit-output.txt
          retention-days: 30

      - name: Check for stub provider usage
        if: always()
        run: |
          if [ -f "artifacts/quality/live_audit_report.json" ]; then
            if grep -q '"stub"' artifacts/quality/live_audit_report.json; then
              echo "::error::Stub provider detected in audit results - this indicates provider drift!"
              exit 1
            fi
          fi

  summary:
    name: Quality Summary
    runs-on: ubuntu-latest
    needs: [unit-quality-tests, answer-quality-replay, live-audit]
    if: always()
    
    steps:
      - name: Generate summary
        run: |
          echo "## Quality Regression Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          
          # Unit tests
          if [ "${{ needs.unit-quality-tests.result }}" == "success" ]; then
            echo "✅ Unit Quality Tests: **Passed**" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Unit Quality Tests: **Failed**" >> $GITHUB_STEP_SUMMARY
          fi

          # Answer quality replay (non-blocking)
          if [ "${{ needs.answer-quality-replay.result }}" == "success" ]; then
            echo "✅ Answer Quality Replay: **Passed** (non-blocking)" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.answer-quality-replay.result }}" == "skipped" ]; then
            echo "⏭️ Answer Quality Replay: **Skipped**" >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ Answer Quality Replay: **Needs review** (non-blocking)" >> $GITHUB_STEP_SUMMARY
          fi
          
          # Live audit
          if [ "${{ needs.live-audit.result }}" == "success" ]; then
            echo "✅ Live Prompt Audit: **Passed**" >> $GITHUB_STEP_SUMMARY
          elif [ "${{ needs.live-audit.result }}" == "skipped" ]; then
            echo "⏭️ Live Prompt Audit: **Skipped** (secrets not available or conditions not met)" >> $GITHUB_STEP_SUMMARY
          else
            echo "❌ Live Prompt Audit: **Failed**" >> $GITHUB_STEP_SUMMARY
          fi

  # Optional Slack notification - step uses continue-on-error: true
  notify:
    name: Notify on Failure
    runs-on: ubuntu-latest
    needs: [unit-quality-tests, live-audit]
    permissions:
      contents: read
      id-token: write
    if: |
      failure() && 
      github.event_name == 'schedule' &&
      github.repository_owner == 'LLMHive'
    
    steps:
      # Authenticate to GCP for Secret Manager access
      - name: Authenticate to Google Cloud
        id: gcp-auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.WIF_PROVIDER }}
          service_account: ${{ secrets.WIF_SERVICE_ACCOUNT }}
        continue-on-error: true

      - name: Fetch Slack webhook from GCP Secret Manager
        if: steps['gcp-auth'].outcome == 'success'
        run: |
          SLACK_URL=$(gcloud secrets versions access latest --secret="slack-webhook-url" --project=llmhive-orchestrator 2>/dev/null || echo "")
          if [ -n "$SLACK_URL" ]; then
            echo "SLACK_WEBHOOK_URL=$SLACK_URL" >> $GITHUB_ENV
          fi

      - name: Send Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v1.25.0
        with:
          payload: |
            {
              "text": "Quality Regression Tests Failed!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Quality Regression Tests Failed*\n\nAnswer quality may have regressed. Please investigate."
                  }
                },
                {
                  "type": "context",
                  "elements": [
                    {
                      "type": "mrkdwn",
                      "text": "<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View workflow run>"
                    }
                  ]
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ env.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK
        continue-on-error: true

